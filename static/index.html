<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TackEff — Group Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<!-- Self-contained fonts (Inter Tight + JetBrains Mono, base64 in CSS). No CDN. -->
<link rel="stylesheet" href="fonts.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="stage-wrap">
  <div id="stage" data-density="normal" data-show-clock="subtle">

    <!-- Header -->
    <div class="gh">
      <div class="gh-left">
        <div class="gh-logo">
          <div class="gh-logo-mark"></div>
          <div class="gh-brand">Tack<em>Eff</em> · Group Ops</div>
        </div>
      </div>

      <div class="gh-center">
        <span class="mono" id="view-idx">01 / 03</span>
        <span class="sep">┤</span>
        <span class="gh-view-name" id="view-name">Calendar</span>
      </div>

      <div class="gh-right">
        <div class="gh-status">
          <span class="dot"></span>
          <span>Live</span>
        </div>
        <div class="gh-clock">
          <div class="gh-clock-time" id="clock-time">—</div>
          <div class="gh-clock-date" id="clock-date">—</div>
        </div>
      </div>
    </div>

    <!-- View area -->
    <div class="view-host" id="view-host"></div>

    <!-- Footer rotation controls -->
    <div class="gf" id="footer">
      <div class="gf-left">
        <span>Auto-rotate</span>
        <div class="gf-progress"><div class="gf-progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="gf-center" id="footer-dots"></div>
      <div class="gf-right">
        <button class="gf-btn" onclick="window.DashRotator && window.DashRotator.prev()">◂ Prev</button>
        <button class="gf-btn" onclick="window.DashRotator && window.DashRotator.setPaused(!window.DashRotator.getState().paused)">Pause / Play</button>
        <button class="gf-btn" onclick="window.DashRotator && window.DashRotator.next()">Next ▸</button>
        <button class="gf-btn" id="reload-btn" onclick="window.DashReload && window.DashReload()">↻ Reload</button>
      </div>
    </div>

  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks" id="tweaks-panel"></div>

<!-- Scripts: data-loader first; it fetches /api/data then injects the other scripts in order. -->
<style>
  /* Stage-wrap must clip; explicit top-left origin for scaling means the stage
     is absolutely positioned and we center it with translate() in JS. */
  #stage-wrap { overflow: hidden; }
  #stage {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    transform-origin: 0 0 !important;
  }
</style>
<script>
  /* Fit 3840×2160 canvas into the viewport. Applied synchronously so scaling
     is right even before data-loader finishes fetching. dashboard.js re-runs
     this on resize once it loads. */
  (function () {
    function fit() {
      var st = document.getElementById("stage");
      if (!st) return;
      var sx = window.innerWidth / 3840;
      var sy = window.innerHeight / 2160;
      var s  = Math.min(sx, sy);
      var tx = (window.innerWidth  - 3840 * s) / 2;
      var ty = (window.innerHeight - 2160 * s) / 2;
      st.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + s + ")";
    }
    fit();
    window.addEventListener("resize", fit);
    window.__fitStage = fit;
  })();
</script>
<script src="data-loader.js"></script>

</body>
</html>
