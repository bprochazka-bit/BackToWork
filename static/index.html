<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TackEff — Group Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="fonts.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="stage-wrap">
  <div id="stage" data-density="normal" data-show-clock="subtle">

    <!-- Header -->
    <div class="gh">
      <div class="gh-left">
        <div class="gh-logo">
          <div class="gh-logo-mark"></div>
          <div class="gh-brand">Tack<em>Eff</em> · Group Ops</div>
        </div>
      </div>

      <div class="gh-center">
        <span class="mono" id="view-idx">01 / 03</span>
        <span class="sep">┤</span>
        <span class="gh-view-name" id="view-name">Calendar</span>
      </div>

      <div class="gh-right">
        <div class="gh-status">
          <span class="dot" id="status-dot"></span>
          <span id="status-label">Loading</span>
        </div>
        <div class="gh-clock">
          <div class="gh-clock-time" id="clock-time">—</div>
          <div class="gh-clock-date" id="clock-date">—</div>
        </div>
      </div>
    </div>

    <!-- View area -->
    <div class="view-host" id="view-host">
      <div class="splash" id="splash">
        <div class="splash-inner">
          <div class="splash-logo"></div>
          <div class="splash-text">Loading dashboard data…</div>
        </div>
      </div>
    </div>

    <!-- Footer rotation controls -->
    <div class="gf" id="footer">
      <div class="gf-left">
        <span>Auto-rotate</span>
        <div class="gf-progress"><div class="gf-progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="gf-center" id="footer-dots"></div>
      <div class="gf-right">
        <button class="gf-btn" onclick="window.DashRotator.prev()">◂ Prev</button>
        <button class="gf-btn" onclick="window.DashRotator.setPaused(!window.DashRotator.getState().paused)">Pause / Play</button>
        <button class="gf-btn" onclick="window.DashRotator.next()">Next ▸</button>
        <button class="gf-btn gf-btn-reload" id="reload-btn" onclick="window.reloadDashboardData()">↺ Reload</button>
      </div>
    </div>

  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks" id="tweaks-panel"></div>

<!-- Scripts — no CDN, all self-contained -->
<script src="calendar-view.js"></script>
<script src="status-view.js"></script>
<script src="capabilities-view.js"></script>
<script src="tweaks.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
